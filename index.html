<!DOCTYPE html>
<!-- DTD é o document Type Definition e informa para o navegador a versão do HTML que stá sendo carregada.
Assim o navegador pode carregar um conjunto de bibliotecas de acordo com a versão específica.
 -->

<!-- ATRIBUTOS:
Os atributos são do tipo chave = valor.
Ex: lamg="pt-br" . isso é um atributo que pode ir em qualquer tag de conteúdo. <html lamg="pt-br"> ... </html>
-->
<html lang="pt-br">
</html>
